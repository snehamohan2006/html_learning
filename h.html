<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* Hero Section */
.hero {
    height: 90vh;
    background: url('https://picsum.photos/1600/900') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

/* Gallery Section */
.gallery {
    padding: 50px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00ffcc;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #000;
    margin-top: 30px;
}
</style>

</head>
<body>

<section class="hero">
    <h1>Welcome to My Image World</h1>
</section>

<section class="gallery">
    <img src="https://picsum.photos/400?random=1">
    <img src="https://picsum.photos/400?random=2">
    <img src="https://picsum.photos/400?random=3">
    <img src="https://picsum.photos/400?random=4">
    <img src="https://picsum.photos/400?random=5">
    <img src="https://picsum.photos/400?random=6">
</section>

<footer>
    © 2026 Sneha | Advanced Image Website
</footer>

</body>
</html>
